<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Clientes — GenAIL CRM</title>
  
  <!-- Estilos del Sistema -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

  <!-- Layout del Sistema -->
  <div class="app-layout">
    
    <!-- Sidebar inyectado dinámicamente -->
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
      
      <!-- Header inyectado dinámicamente -->
      <div id="header-container"></div>

      <!-- Contenido Principal -->
      <main class="main-content">
        
        <!-- Header de la sección -->
        <div class="page-header">
          <div class="page-header-info">
            <h1>Clientes</h1>
            <p>Administra la base de datos de tus clientes, consulta sus categorías y edita sus perfiles.</p>
          </div>
          <div>
            <a href="cliente-form.html" class="btn btn-primary">
              <span>➕</span> Registrar Cliente
            </a>
          </div>
        </div>

        <!-- Filtros y Búsqueda -->
        <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-4);">
          <div class="search-bar">
            <div class="search-input-wrapper">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-input" placeholder="Buscar por nombre, apellidos, correo o empresa...">
            </div>
            
            <div style="display: flex; gap: var(--space-3); flex-wrap: wrap;">
              <select id="filter-estado" class="form-control" style="width: 140px;">
                <option value="">Todos los Estados</option>
                <option value="activo">Activos</option>
                <option value="inactivo">Inactivos</option>
              </select>

              <select id="filter-categoria" class="form-control" style="width: 160px;">
                <option value="">Todas las Categorías</option>
                <option value="premium">Premium</option>
                <option value="frecuente">Frecuente</option>
                <option value="potencial">Potencial</option>
                <option value="inactivo">Inactivo</option>
              </select>

              <button id="btn-reset-filters" class="btn btn-secondary" title="Limpiar Filtros">
                🔄 Limpiar
              </button>
            </div>
          </div>
        </div>

        <!-- Tabla de Clientes -->
        <div class="table-container">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Cliente</th>
                <th>Empresa</th>
                <th>Contacto</th>
                <th>Segmento</th>
                <th>Última Actividad</th>
                <th>Estado</th>
                <th style="text-align: right;">Acciones</th>
              </tr>
            </thead>
            <tbody id="clientes-table-body">
              <tr>
                <td colspan="7" style="text-align: center; color: var(--text-tertiary); padding: var(--space-8);">
                  Cargando clientes...
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Paginación -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-4);">
          <div style="font-size: var(--font-size-xs); color: var(--text-tertiary);" id="pagination-info">
            Mostrando 0 de 0 registros
          </div>
          <div style="display: flex; gap: var(--space-2);">
            <button id="btn-prev-page" class="btn btn-secondary btn-sm" disabled>Anterior</button>
            <button id="btn-next-page" class="btn btn-secondary btn-sm" disabled>Siguiente</button>
          </div>
        </div>

      </main>

      <!-- Footer inyectado dinámicamente -->
      <div id="footer-container"></div>
    </div>
  </div>

  <!-- Modal para ver detalles completos del cliente -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal-box" style="max-width: 600px;">
      <div class="modal-header">
        <h3 id="modal-client-name">Detalle del Cliente</h3>
        <button class="header-btn" onclick="document.getElementById('detail-modal').classList.remove('open')">✕</button>
      </div>
      <div class="modal-body" id="modal-client-body">
        <!-- Rellenado por JS -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="document.getElementById('detail-modal').classList.remove('open')">Cerrar</button>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts del sistema -->
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/clientes.js"></script>
</body>
</html>
