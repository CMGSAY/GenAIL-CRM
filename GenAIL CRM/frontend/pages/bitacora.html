<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bitácora de Actividades — GenAIL CRM</title>
  
  <!-- Estilos del Sistema -->
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
</head>
<body>

  <!-- Layout del Sistema -->
  <div class="app-layout">
    
    <!-- Sidebar inyectado dinámicamente -->
    <div id="sidebar-container"></div>

    <div class="main-wrapper">
      
      <!-- Header inyectado dinámicamente -->
      <div id="header-container"></div>

      <!-- Contenido Principal -->
      <main class="main-content">
        
        <!-- Header de la sección -->
        <div class="page-header">
          <div class="page-header-info">
            <h1>Bitácora de Auditoría</h1>
            <p>Monitorea y audita todas las acciones relevantes realizadas por los usuarios del sistema.</p>
          </div>
        </div>

        <!-- Filtros y Búsqueda -->
        <div class="card" style="margin-bottom: var(--space-6); padding: var(--space-4);">
          <div class="search-bar">
            <div class="search-input-wrapper">
              <span class="search-icon">🔍</span>
              <input type="text" id="search-usuario" placeholder="Filtrar por nombre de usuario...">
            </div>
            
            <div style="display: flex; gap: var(--space-3); flex-wrap: wrap;">
              <select id="filter-modulo" class="form-control" style="width: 180px;">
                <option value="">Todos los Módulos</option>
                <option value="autenticacion">Autenticación</option>
                <option value="clientes">Clientes</option>
                <option value="compras">Compras</option>
                <option value="leads">Leads</option>
                <option value="seguimientos">Seguimientos</option>
                <option value="usuarios">Usuarios</option>
                <option value="dashboard">Dashboard</option>
                <option value="sistema">Sistema</option>
              </select>

              <button id="btn-reset-bitacora" class="btn btn-secondary">
                🔄 Limpiar
              </button>
            </div>
          </div>
        </div>

        <!-- Tabla de Bitácora -->
        <div class="table-container">
          <table class="custom-table">
            <thead>
              <tr>
                <th>Fecha y Hora</th>
                <th>Usuario</th>
                <th>Operación / Acción</th>
                <th>Módulo</th>
                <th>Descripción de la Actividad</th>
                <th>Dirección IP</th>
              </tr>
            </thead>
            <tbody id="bitacora-table-body">
              <tr>
                <td colspan="6" style="text-align: center; color: var(--text-tertiary); padding: var(--space-8);">
                  Cargando registros de auditoría...
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- Paginación -->
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: var(--space-4);">
          <div style="font-size: var(--font-size-xs); color: var(--text-tertiary);" id="bitacora-pagination-info">
            Mostrando 0 de 0 registros
          </div>
          <div style="display: flex; gap: var(--space-2);">
            <button id="btn-bitacora-prev" class="btn btn-secondary btn-sm" disabled>Anterior</button>
            <button id="btn-bitacora-next" class="btn btn-secondary btn-sm" disabled>Siguiente</button>
          </div>
        </div>

      </main>

      <!-- Footer inyectado dinámicamente -->
      <div id="footer-container"></div>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Scripts del sistema -->
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/components.js"></script>
  <script src="../js/bitacora.js"></script>
</body>
</html>
